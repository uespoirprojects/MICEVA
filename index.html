<html lang="en">

     <!-- Favicon (Vite resolves /src/... paths at build time) -->

    <!-- Open Graph (partage sur réseaux sociaux) -->
    <meta property="og:title" content="MISSION CHAPELLE ÉVANGÉLIQUE" />
    <meta property="og:description" content="Mission Chapelle Évangélique - Vision en Action" />
    <!-- Use the same asset path so Vite rewrites it in dist; for social previews, prefer an absolute https URL to your deployed image -->
    <meta property="og:image" content="/src/assets/images/miceva.png" />
    <meta property="og:url" content="https://miceva.org" />
    <meta property="og:type" content="website" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miceva</title>
  </head>
